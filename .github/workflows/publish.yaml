name: Publish Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest
    env:
      ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
      ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
      ENTRA_SCOPES: ${{ secrets.ENTRA_SCOPES }}
      ENTRA_AUTHORITY: ${{ secrets.ENTRA_AUTHORITY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate Entra Build Variables
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ENTRA_CLIENT_ID)) { throw "Missing secret: ENTRA_CLIENT_ID" }
          if ([string]::IsNullOrWhiteSpace($env:ENTRA_TENANT_ID)) { throw "Missing secret: ENTRA_TENANT_ID" }
          Write-Host "Entra build vars are present."

      - run: npm run inject:assistances
        env:
          AUTHORIZED_ASSISTANCES_JSON: ${{ secrets.AUTHORIZED_ASSISTANCES_JSON }}
          AUTHORIZED_ASSISTANCES_JSON_B64: ${{ secrets.AUTHORIZED_ASSISTANCES_JSON_B64 }}

      - name: Inject Sensitive Data Files
        shell: pwsh
        env:
          BETA_TESTERS_JSON: ${{ secrets.BETA_TESTERS_JSON }}
          BETA_TESTERS_JSON_B64: ${{ secrets.BETA_TESTERS_JSON_B64 }}
          BUG_BUSTERS_JSON: ${{ secrets.BUG_BUSTERS_JSON }}
          BUG_BUSTERS_JSON_B64: ${{ secrets.BUG_BUSTERS_JSON_B64 }}
          DEVELOPERS_JSON: ${{ secrets.DEVELOPERS_JSON }}
          DEVELOPERS_JSON_B64: ${{ secrets.DEVELOPERS_JSON_B64 }}
        run: |
          $targetDir = Join-Path $PWD "src/data"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

          function Write-JsonFromSecret([string]$rawJson, [string]$base64, [string]$path, [string]$rawName, [string]$b64Name) {
            if (-not [string]::IsNullOrWhiteSpace($rawJson)) {
              $null = $rawJson | ConvertFrom-Json
              Set-Content -Path $path -Value $rawJson -Encoding UTF8
              Write-Host "Wrote $path"
              return
            }

            if (-not [string]::IsNullOrWhiteSpace($base64)) {
              $bytes = [Convert]::FromBase64String($base64)
              $content = [Text.Encoding]::UTF8.GetString($bytes)
              $null = $content | ConvertFrom-Json
              Set-Content -Path $path -Value $content -Encoding UTF8
              Write-Host "Wrote $path"
              return
            }

            throw "Missing secret: $rawName or $b64Name"
          }

          Write-JsonFromSecret $env:BETA_TESTERS_JSON $env:BETA_TESTERS_JSON_B64 (Join-Path $targetDir "beta-testers.json") "BETA_TESTERS_JSON" "BETA_TESTERS_JSON_B64"
          Write-JsonFromSecret $env:BUG_BUSTERS_JSON $env:BUG_BUSTERS_JSON_B64 (Join-Path $targetDir "bug-busters.json") "BUG_BUSTERS_JSON" "BUG_BUSTERS_JSON_B64"
          Write-JsonFromSecret $env:DEVELOPERS_JSON $env:DEVELOPERS_JSON_B64 (Join-Path $targetDir "developers.json") "DEVELOPERS_JSON" "DEVELOPERS_JSON_B64"

      - run: npm run make

      - run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run release:notes
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const notes = fs.readFileSync(".github/release-notes.md", "utf8");
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let release = null;

            for (let attempt = 1; attempt <= 8; attempt++) {
              try {
                const response = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag,
                });
                release = response.data;
                core.info(`Release found on attempt ${attempt}: id=${release.id}`);
                break;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                core.info(`Release not found for tag ${tag} (attempt ${attempt}/8). Waiting 10s...`);
                await sleep(10000);
              }
            }

            if (!release) {
              core.info(`Release for tag ${tag} still not found. Creating draft release with generated notes.`);
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: notes,
                draft: true,
                prerelease: false,
                target_commitish: context.sha,
              });
              core.info(`Draft release created: id=${created.data.id}`);
            } else {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                body: notes,
              });
              core.info(`Release notes updated for tag ${tag}.`);
            }
